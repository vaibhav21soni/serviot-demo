# Local dev-parity stack: Nginx -> API -> Postgres.
# Bring up with:  cp .env.example .env && docker compose up --build
# No manual steps beyond providing the .env file.
#
# Config comes from .env two ways:
#   1. env_file: .env  -> injects the vars into the db/api containers.
#   2. ${VAR} below     -> compose auto-reads the project-root .env for
#                          substitution in the compose file itself (ports,
#                          healthcheck). Defaults keep it runnable if unset.

services:
  db:
    image: postgres:16-alpine
    env_file: .env          # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # Gate the app on real readiness, not just "container started".
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serviot} -d ${POSTGRES_DB:-serviot}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env          # APP_*, POSTGRES_*, DB_POOL_*
    environment:
      # Override host/port so container-to-container networking is always
      # correct, regardless of what the local .env holds (env wins over env_file).
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_HOST_PORT:-8041}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
