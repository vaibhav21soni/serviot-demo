# Reverse proxy in front of the API.
# Docker's embedded DNS resolves `api` to the app container.

upstream devices_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Do not leak the proxy software version.
    server_tokens off;

    # Basic request-rate ceiling; burst absorbs spikes.
    # (limit_req_zone is defined in the http block of the base image config;
    #  for a demo we keep proxy behavior here and rely on upstream limits.)

    client_max_body_size 1m;

    # Fast path for load-balancer / uptime probes: proxy straight to /health.
    location = /health {
        proxy_pass http://devices_api/health;
        access_log off;
    }

    location / {
        proxy_pass http://devices_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
